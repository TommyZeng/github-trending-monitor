# GitHub 每日热门项目采集与 Discord 推送工作流
name: daily-collect

on:
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = 北京时间 09:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ hashFiles('config.yaml') }}

      - name: Run collector
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}   # 描述中文翻译(MiniMax);未配则回退 Google 翻译
        run: python -m ghtrend.collect

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: trending $(date -u +%F)"
          git push
