daily_top_n: 10
languages: null        # null=全部;或 [Python, Rust, TypeScript]
semantic_top_k: 10
embedding_model: "BAAI/bge-m3"          # Actions 云端采集时用的本地模型
# 本机语义搜索改用在线 OpenAI 兼容 embedding 服务(留空 "" 则回退本地模型)
# key 放在 .env 的 EMBEDDING_API_KEY(已被 .gitignore 忽略)
embedding_api_base: "http://10.0.0.1:7000/v1"
embedding_api_model: "bge-m3"
# 实时 GitHub 语义搜索:LLM 提关键词 + reranker 重排(两者都配齐才启用该模式)
# key 放 .env:LLM_API_KEY、RERANKER_API_KEY
llm_api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"   # 关键词提取(质量敏感,用 deepseek)
llm_model: "deepseek-v4-flash"
# 摘要单独用本机 vLLM 小模型(0.8B 摘要够用、省外部调用);留空则沿用上面的 llm_*
summary_api_base: "http://10.0.0.1:8001/v1"
summary_model: "qwen3.5-0.8b"
reranker_api_base: "http://10.0.0.1:8787/v1"
reranker_model: "bge-reranker-v2-m3"
realtime_per_keyword: 10
web_port: 8005          # 本机 web 服务端口
trending_since: "daily"
data_dir: "data"
